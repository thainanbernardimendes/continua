<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#157475">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CONTINUA">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23157475' width='180' height='180'/><text x='50%' y='50%' font-size='80' fill='white' text-anchor='middle' dy='.3em' font-family='system-ui'>C</text></svg>">
  <link rel="manifest" href="manifest.json">
  <title>CONTINUA - App de Adesão Nutricional</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    #app {
      min-height: 100vh;
    }
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .notification {
      animation: slideIn 0.3s ease-out;
    }
    textarea, input {
      font-size: 16px; /* Previne zoom em mobile */
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBRqqgA7_jJyHNJUwcDpFyEmUHoUesnKDg",
      authDomain: "continua-app-bd0ab.firebaseapp.com",
      projectId: "continua-app-bd0ab",
      storageBucket: "continua-app-bd0ab.firebasestorage.app",
      messagingSenderId: "105620107590",
      appId: "1:105620107590:web:1b01790580bba84c4f7547",
      measurementId: "G-43E7NQN9WD"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const brandColor = '#157475';
    
    const app = {
      state: {
        user: null,
        screen: 'dashboard',
        currentPatientId: '1',
        patients: [
          { id: '1', name: 'Tainá', email: 'taina@email.com', phone: '11987654321' },
          { id: '2', name: 'Lilian', email: 'lilian@email.com', phone: '11987654322' },
          { id: '3', name: 'Luisa', email: 'luisa@email.com', phone: '11987654323' },
          { id: '4', name: 'Marciana', email: 'marciana@email.com', phone: '11987654324' },
        ],
        meals: [],
        checkins: [],
        weights: [],
        formData: {},
        showMenu: false,
        notifications: [],
        syncing: false,
        syncListeners: []
      },

      init() {
        const params = new URLSearchParams(window.location.search);
        const patientId = params.get('patient');
        
        if (patientId && this.state.patients.find(p => p.id === patientId)) {
          this.state.currentPatientId = patientId;
          const patientName = this.state.patients.find(p => p.id === patientId)?.name;
          this.state.user = { type: 'patient', name: patientName };
          this.state.screen = 'dashboard';
          this.loadPatientData();
        }

        this.setupFirebaseListeners();
        this.render();
      },

      setupFirebaseListeners() {
        // Sync meals com debounce para evitar atualizações excessivas
        let mealTimeout;
        const mealRef = db.ref('meals');
        mealRef.on('value', (snapshot) => {
          clearTimeout(mealTimeout);
          mealTimeout = setTimeout(() => {
            const data = snapshot.val();
            this.state.meals = data ? Object.values(data) : [];
            // Salvar no localStorage como backup
            localStorage.setItem('meals_backup', JSON.stringify(this.state.meals));
            if (this.state.user) this.render();
          }, 300);
        });
        this.state.syncListeners.push(mealRef);

        // Sync checkins
        let checkinTimeout;
        const checkinRef = db.ref('checkins');
        checkinRef.on('value', (snapshot) => {
          clearTimeout(checkinTimeout);
          checkinTimeout = setTimeout(() => {
            const data = snapshot.val();
            this.state.checkins = data ? Object.values(data) : [];
            localStorage.setItem('checkins_backup', JSON.stringify(this.state.checkins));
            if (this.state.user) this.render();
          }, 300);
        });
        this.state.syncListeners.push(checkinRef);

        // Sync weights
        let weightTimeout;
        const weightRef = db.ref('weights');
        weightRef.on('value', (snapshot) => {
          clearTimeout(weightTimeout);
          weightTimeout = setTimeout(() => {
            const data = snapshot.val();
            this.state.weights = data ? Object.values(data) : [];
            localStorage.setItem('weights_backup', JSON.stringify(this.state.weights));
            if (this.state.user) this.render();
          }, 300);
        });
        this.state.syncListeners.push(weightRef);
      },

      loadPatientData() {
        // Tenta carregar do localStorage primeiro (mais rápido)
        const mealBackup = localStorage.getItem('meals_backup');
        const checkinBackup = localStorage.getItem('checkins_backup');
        const weightBackup = localStorage.getItem('weights_backup');

        if (mealBackup) this.state.meals = JSON.parse(mealBackup);
        if (checkinBackup) this.state.checkins = JSON.parse(checkinBackup);
        if (weightBackup) this.state.weights = JSON.parse(weightBackup);

        // Depois sincroniza com Firebase
        db.ref('meals').once('value', (snapshot) => {
          const data = snapshot.val();
          this.state.meals = data ? Object.values(data) : [];
          localStorage.setItem('meals_backup', JSON.stringify(this.state.meals));
          this.render();
        });

        db.ref('checkins').once('value', (snapshot) => {
          const data = snapshot.val();
          this.state.checkins = data ? Object.values(data) : [];
          localStorage.setItem('checkins_backup', JSON.stringify(this.state.checkins));
          this.render();
        });

        db.ref('weights').once('value', (snapshot) => {
          const data = snapshot.val();
          this.state.weights = data ? Object.values(data) : [];
          localStorage.setItem('weights_backup', JSON.stringify(this.state.weights));
          this.render();
        });
      },

      addNotification(message, type = 'info') {
        const id = Date.now();
        this.state.notifications.push({ id, message, type });
        this.render();
        setTimeout(() => {
          this.state.notifications = this.state.notifications.filter(n => n.id !== id);
          this.render();
        }, 4000);
      },

      handleLogin(type) {
        if (type === 'nutritionist') {
          this.state.user = { type: 'nutritionist', name: 'Thainan' };
          this.state.screen = 'panel';
        } else {
          this.state.user = { type: 'patient', name: this.state.patients[0]?.name };
          this.state.currentPatientId = '1';
          this.state.screen = 'dashboard';
          this.loadPatientData();
        }
        this.render();
      },

      logout() {
        this.state.user = null;
        this.state.showMenu = false;
        this.state.screen = 'dashboard';
        this.render();
      },

      addMeal(mealData) {
        const newMeal = {
          id: Date.now().toString(),
          patientId: this.state.currentPatientId,
          date: new Date().toISOString().split('T')[0],
          time: mealData.time,
          status: mealData.status,
          notes: mealData.notes || '',
          timestamp: new Date().toISOString()
        };
        
        // Salvar localmente primeiro
        this.state.meals.push(newMeal);
        localStorage.setItem('meals_backup', JSON.stringify(this.state.meals));
        
        // Depois no Firebase
        db.ref('meals/' + newMeal.id).set(newMeal).catch(() => {
          this.addNotification('Erro ao sincronizar. Tentaremos novamente.', 'error');
        });
        
        this.addNotification('Refeição registrada com sucesso!', 'success');
        this.state.screen = 'dashboard';
        this.render();
      },

      addCheckin(checkinData) {
        const newCheckin = {
          id: Date.now().toString(),
          patientId: this.state.currentPatientId,
          date: new Date().toISOString(),
          adherence: checkinData.adherence,
          hunger: checkinData.hunger,
          sweet: checkinData.sweet,
          energy: checkinData.energy,
          anxiety: checkinData.anxiety,
          control: checkinData.control,
          difficulty: checkinData.difficulty || '',
          needsHelp: checkinData.needsHelp
        };
        
        this.state.checkins.push(newCheckin);
        localStorage.setItem('checkins_backup', JSON.stringify(this.state.checkins));
        
        db.ref('checkins/' + newCheckin.id).set(newCheckin).catch(() => {
          this.addNotification('Erro ao sincronizar. Tentaremos novamente.', 'error');
        });
        
        this.addNotification('Check-in salvo! Thainan vai analisar sua semana.', 'success');
        this.state.screen = 'dashboard';
        this.render();
      },

      addWeight(weightData) {
        const newWeight = {
          id: Date.now().toString(),
          patientId: this.state.currentPatientId,
          date: new Date().toISOString().split('T')[0],
          weight: parseFloat(weightData.weight),
          feeling: weightData.feeling,
          timestamp: new Date().toISOString()
        };
        
        this.state.weights.push(newWeight);
        localStorage.setItem('weights_backup', JSON.stringify(this.state.weights));
        
        db.ref('weights/' + newWeight.id).set(newWeight).catch(() => {
          this.addNotification('Erro ao sincronizar. Tentaremos novamente.', 'error');
        });
        
        this.addNotification('Peso registrado!', 'success');
        this.state.screen = 'dashboard';
        this.render();
      },

      renderLogin() {
        const baseURL = window.location.href.split('?')[0];
        
        return `
          <div style="min-height: 100vh; background: #f5f5f5; display: flex; align-items: center; justify-content: center; padding: 1rem;">
            <div style="max-width: 500px; width: 100%;">
              <div style="background: #ffffff; border-radius: 12px; padding: 2rem; border: 0.5px solid ${brandColor}20;">
                <h1 style="font-size: 28px; font-weight: 500; margin-bottom: 0.5rem; color: ${brandColor};">CONTINUA</h1>
                <p style="font-size: 13px; color: #666; margin-bottom: 2rem;">App de adesão nutricional</p>

                <div style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 0.5px solid ${brandColor}20;">
                  <h2 style="font-size: 13px; font-weight: 500; color: #333; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px;">Links das pacientes</h2>
                  
                  ${this.state.patients.map(patient => `
                    <div style="margin-bottom: 1rem; padding: 0.75rem; background: #f9f9f9; border-radius: 6px; border: 0.5px solid #e0e0e0;">
                      <p style="font-size: 12px; font-weight: 500; color: #333; margin: 0 0 6px 0;">${patient.name}</p>
                      <div style="display: flex; gap: 6px; align-items: center;">
                        <input type="text" value="${baseURL}?patient=${patient.id}" readonly style="flex: 1; padding: 6px 8px; font-size: 11px; border-radius: 4px; border: 0.5px solid #e0e0e0; background: #ffffff; font-family: monospace;" />
                        <button onclick="app.copyLink('${baseURL}?patient=${patient.id}', '${patient.name}')" style="padding: 6px 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 500; color: #ffffff; white-space: nowrap;">Copiar</button>
                      </div>
                    </div>
                  `).join('')}
                </div>

                <p style="font-size: 12px; color: #666; margin-bottom: 1.5rem; font-style: italic;">Ou entre como:</p>

                <button onclick="app.handleLogin('patient')" style="width: 100%; padding: 12px; margin-bottom: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff;">
                  Entrar como Paciente
                </button>

                <button onclick="app.handleLogin('nutritionist')" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Acessar Painel (Nutricionista)
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderDashboard() {
        const currentPatient = this.state.patients.find(p => p.id === this.state.currentPatientId);
        const weekMeals = this.state.meals.filter(m => {
          const mealDate = new Date(m.date);
          const weekStart = new Date();
          weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
          return m.patientId === this.state.currentPatientId && mealDate >= weekStart;
        });
        const adherence = weekMeals.length > 0 ? Math.round((weekMeals.filter(m => m.status === 'done' || m.status === 'adapted').length / Math.max(weekMeals.length, 1)) * 100) : 0;
        const lastWeight = this.state.weights.filter(w => w.patientId === this.state.currentPatientId).sort((a, b) => new Date(b.date) - new Date(a.date))[0];

        let weekDaysHtml = '';
        for (let i = 0; i < 7; i++) {
          const date = new Date();
          date.setDate(date.getDate() - date.getDay() + 1 + i);
          const dayMeals = this.state.meals.filter(m => m.patientId === this.state.currentPatientId && m.date === date.toISOString().split('T')[0]);
          const dayStatus = dayMeals.length === 0 ? 'empty' : dayMeals.some(m => m.status === 'done') ? 'good' : 'ok';
          const colors = { empty: '#e8e8e8', good: '#d4f0ed', ok: '#fff3cd' };
          const days = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'];
          weekDaysHtml += `
            <div style="background: ${colors[dayStatus]}; border-radius: 6px; padding: 8px; text-align: center;">
              <p style="font-size: 11px; font-weight: 500; margin: 0 0 4px 0; color: #666;">${days[i]}</p>
              <p style="font-size: 13px; font-weight: 500; margin: 0; color: ${brandColor};">${dayMeals.length}</p>
            </div>
          `;
        }

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <h1 style="font-size: 18px; font-weight: 500; margin: 0;">Oi, ${currentPatient?.name.split(' ')[0]}!</h1>
                <p style="font-size: 12px; margin: 4px 0 0 0; opacity: 0.9;">Semana em progresso</p>
              </div>
              <button onclick="app.state.showMenu = !app.state.showMenu; app.render();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 20px;">≡</button>
            </div>

            ${this.state.showMenu ? `
              <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex;">
                <div style="background: #ffffff; padding: 1rem; width: 160px; margin-left: auto;">
                  <button onclick="app.state.showMenu = false; app.render();" style="background: none; border: none; cursor: pointer; font-size: 18px; margin-bottom: 1rem; width: 100%; text-align: right;">✕</button>
                  <button onclick="app.logout();" style="width: 100%; padding: 10px; background: transparent; border: 0.5px solid ${brandColor}; border-radius: 4px; cursor: pointer; font-size: 13px; color: ${brandColor}; font-weight: 500;">Sair</button>
                </div>
              </div>
            ` : ''}

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              <h2 style="font-size: 12px; color: #999; font-weight: 500; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;">Sua semana</h2>
              <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 1.5rem;">
                ${weekDaysHtml}
              </div>

              <button onclick="app.state.screen = 'meal'; app.state.formData = {}; app.render();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; font-size: 14px; font-weight: 500; color: #ffffff; cursor: pointer; margin-bottom: 1rem;">
                Registrar refeição hoje
              </button>

              <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; margin-bottom: 1rem;">
                <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Adesão da semana</p>
                <p style="font-size: 18px; font-weight: 500; margin: 0 0 4px 0; color: ${brandColor};">${weekMeals.filter(m => m.status === 'done' || m.status === 'adapted').length} de ${Math.max(weekMeals.length, 35)} refeições</p>
                <p style="font-size: 12px; color: ${adherence >= 80 ? '#28a745' : '#666'}; margin: 0;">${adherence}%</p>
              </div>

              <div onclick="app.state.screen = 'checkin'; app.state.formData = {}; app.render();" style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}20; margin-bottom: 1rem; cursor: pointer;">
                <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Próximo passo</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <p style="font-size: 14px; font-weight: 500; margin: 0; color: ${brandColor};">Check-in semanal</p>
                    <p style="font-size: 12px; color: #999; margin: 4px 0 0 0;">Domingo à noite</p>
                  </div>
                  <span style="font-size: 18px;">›</span>
                </div>
              </div>

              <div onclick="app.state.screen = 'weight'; app.state.formData = {}; app.render();" style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; margin-bottom: 1rem; cursor: pointer;">
                <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Último peso</p>
                <p style="font-size: 16px; font-weight: 500; margin: 0; color: #333;">
                  ${lastWeight ? `${lastWeight.weight}kg` : 'Nenhum registro'}
                </p>
              </div>

              <button onclick="app.state.screen = 'weightHistory'; app.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; font-size: 14px; font-weight: 500; color: ${brandColor}; cursor: pointer; margin-bottom: 1rem;">
                Ver histórico de pesos
              </button>

              <button onclick="app.state.screen = 'mealHistory'; app.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; font-size: 14px; font-weight: 500; color: ${brandColor}; cursor: pointer;">
                Ver histórico de refeições
              </button>
            </div>
          </div>
        `;
      },

      renderMealHistory() {
        const patientMeals = this.state.meals.filter(w => w.patientId === this.state.currentPatientId).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        const mealLabels = {
          breakfast: 'Café da manhã',
          snack1: 'Lanche da manhã',
          lunch: 'Almoço',
          snack2: 'Lanche da tarde',
          dinner: 'Jantar'
        };

        const statusLabels = {
          done: '✓ Fiz como planejado',
          adapted: '~ Adaptei bem',
          improvised: '! Improvisei',
          skipped: '× Pulei'
        };

        const statusColors = {
          done: '#28a745',
          adapted: '#0066cc',
          improvised: '#ffc107',
          skipped: '#dc3545'
        };

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Histórico de refeições</h1>
              <button onclick="app.state.screen = 'dashboard'; app.render();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 20px;">✕</button>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              ${patientMeals.length > 0 ? `
                <div style="display: grid; gap: 8px;">
                  ${patientMeals.map((meal, i) => `
                    <div style="background: #ffffff; border-radius: 6px; padding: 12px; border: 0.5px solid #e0e0e0;">
                      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                        <div>
                          <p style="font-size: 13px; font-weight: 500; margin: 0; color: #333;">${mealLabels[meal.time] || meal.time}</p>
                          <p style="font-size: 11px; color: #999; margin: 2px 0 0 0;">${new Date(meal.date).toLocaleDateString('pt-BR')} às ${new Date(meal.timestamp).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                        <span style="padding: 4px 8px; background: ${statusColors[meal.status]}; color: #ffffff; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; margin-left: 8px;">${statusLabels[meal.status]}</span>
                      </div>
                      ${meal.notes ? `<p style="font-size: 12px; color: #666; margin: 0; font-style: italic; padding: 8px; background: #f9f9f9; border-radius: 4px; border-left: 3px solid ${statusColors[meal.status]};">"${meal.notes}"</p>` : ''}
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div style="background: #ffffff; border-radius: 8px; padding: 2rem; text-align: center; border: 0.5px solid #e0e0e0;">
                  <p style="color: #999; margin: 0;">Nenhuma refeição registrada ainda</p>
                </div>
              `}
            </div>
          </div>
        `;
      },

      renderMeal() {
        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Registrar refeição</h1>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto;">
              <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0;">
                <label style="display: block; margin-bottom: 1rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Qual refeição?</p>
                  <select id="mealTime" value="${this.state.formData.time || ''}" onchange="app.state.formData.time = this.value;" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; font-family: inherit;">
                    <option value="">Selecione</option>
                    <option value="breakfast">Café da manhã</option>
                    <option value="snack1">Lanche da manhã</option>
                    <option value="lunch">Almoço</option>
                    <option value="snack2">Lanche da tarde</option>
                    <option value="dinner">Jantar</option>
                  </select>
                </label>

                <div style="margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 1rem; color: #333;">Como foi essa refeição?</p>
                  ${['done', 'adapted', 'improvised', 'skipped'].map(status => `
                    <button onclick="app.state.formData.status = '${status}'; app.render();" style="width: 100%; padding: 12px; margin-bottom: 8px; background: ${this.state.formData.status === status ? brandColor : '#ffffff'}; border: 0.5px solid ${this.state.formData.status === status ? brandColor : '#e0e0e0'}; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: ${this.state.formData.status === status ? '#ffffff' : '#333'};">
                      ${status === 'done' ? '✓ Fiz como planejado' : status === 'adapted' ? '~ Adaptei bem' : status === 'improvised' ? '! Improvisei' : '× Pulei'}
                    </button>
                  `).join('')}
                </div>

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Observação (opcional)</p>
                  <textarea id="mealNotes" onchange="app.state.formData.notes = this.value;" placeholder="Ex: comi um doce, pulei porque estava ocupada" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 16px; font-family: inherit; min-height: 60px; resize: vertical;">${this.state.formData.notes || ''}</textarea>
                </label>

                <button onclick="app.saveMeal();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff; margin-bottom: 8px;">
                  Pronto!
                </button>

                <button onclick="app.state.screen = 'dashboard'; app.state.formData = {}; app.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderCheckin() {
        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Check-in semanal</h1>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0;">

                ${['adherence', 'hunger', 'sweet', 'energy', 'anxiety', 'control'].map(key => {
                  const labels = {
                    adherence: 'Como foi sua adesão?',
                    hunger: 'Seu nível de fome?',
                    sweet: 'Vontade de doce?',
                    energy: 'Sua energia?',
                    anxiety: 'Ansiedade interferiu?',
                    control: 'Sensação de controle?'
                  };
                  return `
                    <div style="margin-bottom: 1.5rem;">
                      <label style="display: block; margin-bottom: 0.75rem;">
                        <p style="font-size: 12px; font-weight: 500; color: #333; margin: 0;">${labels[key]}</p>
                      </label>
                      <div style="display: flex; gap: 6px; justify-content: space-between;">
                        ${[1,2,3,4,5].map(val => `
                          <button onclick="app.state.formData.${key} = ${val}; app.render();" style="width: 100%; padding: 8px; background: ${this.state.formData[key] === val ? brandColor : '#f5f5f5'}; border: 0.5px solid ${this.state.formData[key] === val ? brandColor : '#e0e0e0'}; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: ${this.state.formData[key] === val ? 500 : 400}; color: ${this.state.formData[key] === val ? '#ffffff' : '#666'};">
                            ${val}
                          </button>
                        `).join('')}
                      </div>
                    </div>
                  `;
                }).join('')}

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 12px; font-weight: 500; margin-bottom: 6px; color: #333;">Qual foi a principal dificuldade? (opcional)</p>
                  <textarea id="checkinDifficulty" onchange="app.state.formData.difficulty = this.value;" placeholder="Ex: muito doce, não consegui parar" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 16px; min-height: 50px;">${this.state.formData.difficulty || ''}</textarea>
                </label>

                <label style="display: block; margin-bottom: 1.5rem;">
                  <input type="checkbox" id="checkinHelp" onchange="app.state.formData.needsHelp = this.checked;" style="margin-right: 8px; accent-color: ${brandColor};" />
                  <span style="font-size: 13px; color: #333;">Estou travada e preciso de ajuda</span>
                </label>

                <button onclick="app.saveCheckin();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff; margin-bottom: 8px;">
                  Enviar check-in
                </button>

                <button onclick="app.state.screen = 'dashboard'; app.state.formData = {}; app.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderWeight() {
        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Registrar peso</h1>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto;">
              <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0;">

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Quanto você pesa?</p>
                  <input type="number" id="weightInput" onchange="app.state.formData.weight = this.value;" step="0.1" placeholder="Ex: 75.2" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 16px; font-family: inherit;" value="${this.state.formData.weight || ''}" />
                </label>

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Como você se sente com seu peso?</p>
                  <select id="weightFeeling" onchange="app.state.formData.feeling = this.value;" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; font-family: inherit;">
                    <option value="">Selecione</option>
                    <option value="terrible">Péssimo</option>
                    <option value="bad">Ruim</option>
                    <option value="ok">Ok</option>
                    <option value="good">Bem</option>
                    <option value="excellent">Ótimo</option>
                  </select>
                </label>

                <button onclick="app.saveWeight();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff; margin-bottom: 8px;">
                  Registrar
                </button>

                <button onclick="app.state.screen = 'dashboard'; app.state.formData = {}; app.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderWeightHistory() {
        const patientWeights = this.state.weights.filter(w => w.patientId === this.state.currentPatientId).sort((a, b) => new Date(a.date) - new Date(b.date));
        
        const firstWeight = patientWeights[0]?.weight || 0;
        const lastWeight = patientWeights[patientWeights.length - 1]?.weight || 0;
        const variation = (lastWeight - firstWeight).toFixed(1);

        let svgPath = '';
        if (patientWeights.length > 1) {
          const minW = Math.min(...patientWeights.map(w => w.weight));
          const maxW = Math.max(...patientWeights.map(w => w.weight));
          const range = maxW - minW || 1;
          svgPath = patientWeights.map((w, i) => {
            const x = (i / (patientWeights.length - 1)) * 280 + 10;
            const y = 180 - ((w.weight - minW) / range) * 150;
            return `${x},${y}`;
          }).join(' ');
        }

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Sua evolução</h1>
              <button onclick="app.state.screen = 'dashboard'; app.render();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 20px;">✕</button>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              ${patientWeights.length > 0 ? `
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; margin-bottom: 1.5rem;">
                  <svg width="100%" height="200" viewBox="0 0 300 200" style="margin-bottom: 1rem;">
                    ${patientWeights.length > 1 ? `
                      <polyline points="${svgPath}" fill="none" stroke="${brandColor}" stroke-width="2" />
                    ` : ''}
                    ${patientWeights.map((w, i) => {
                      const minW = Math.min(...patientWeights.map(p => p.weight));
                      const maxW = Math.max(...patientWeights.map(p => p.weight));
                      const range = maxW - minW || 1;
                      const x = (i / (patientWeights.length - 1)) * 280 + 10;
                      const y = 180 - ((w.weight - minW) / range) * 150;
                      return `<circle cx="${x}" cy="${y}" r="3" fill="${brandColor}" />`;
                    }).join('')}
                  </svg>
                </div>

                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem;">
                  <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}40;">
                    <p style="font-size: 11px; color: #999; margin: 0 0 4px 0; font-weight: 500;">Peso inicial</p>
                    <p style="font-size: 16px; font-weight: 500; margin: 0; color: #333;">${firstWeight}kg</p>
                  </div>
                  <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}40;">
                    <p style="font-size: 11px; color: #999; margin: 0 0 4px 0; font-weight: 500;">Peso atual</p>
                    <p style="font-size: 16px; font-weight: 500; margin: 0; color: ${brandColor};">${lastWeight}kg</p>
                  </div>
                </div>

                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; margin-bottom: 1.5rem;">
                  <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Variação total</p>
                  <p style="font-size: 18px; font-weight: 500; margin: 0; color: ${variation < 0 ? '#28a745' : variation > 0 ? '#dc3545' : '#666'};">
                    ${variation < 0 ? '▼' : variation > 0 ? '▲' : '→'} ${Math.abs(variation)}kg
                  </p>
                </div>

                <h3 style="font-size: 12px; color: #666; font-weight: 500; margin-bottom: 1rem;">Histórico</h3>
                <div style="display: grid; gap: 8px;">
                  ${[...patientWeights].reverse().map((w, i) => `
                    <div style="background: #ffffff; border-radius: 6px; padding: 12px; border: 0.5px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                      <div>
                        <p style="font-size: 13px; font-weight: 500; margin: 0; color: #333;">${new Date(w.date).toLocaleDateString('pt-BR')}</p>
                        <p style="font-size: 11px; color: #999; margin: 2px 0 0 0;">Semana ${i + 1}</p>
                      </div>
                      <p style="font-size: 14px; font-weight: 500; margin: 0; color: ${brandColor};">${w.weight}kg</p>
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div style="background: #ffffff; border-radius: 8px; padding: 2rem; text-align: center; border: 0.5px solid #e0e0e0;">
                  <p style="color: #999; margin: 0;">Nenhum peso registrado ainda</p>
                  <button onclick="app.state.screen = 'weight'; app.render();" style="margin-top: 1rem; padding: 10px 20px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: #ffffff;">
                    Registrar primeiro peso
                  </button>
                </div>
              `}
            </div>
          </div>
        `;
      },

      renderPanel() {
        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Painel da Nutricionista</h1>
              <button onclick="app.logout();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 18px;">↗</button>
            </div>

            <div style="padding: 1rem; max-width: 900px; margin: 0 auto; padding-bottom: 2rem;">
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}40; text-align: center;">
                  <p style="font-size: 24px; font-weight: 500; margin: 0; color: ${brandColor};">${this.state.patients.length}</p>
                  <p style="font-size: 11px; color: #999; margin: 8px 0 0 0;">Pacientes</p>
                </div>
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                  <p style="font-size: 24px; font-weight: 500; margin: 0; color: ${brandColor};">${this.state.meals.length}</p>
                  <p style="font-size: 11px; color: #999; margin: 8px 0 0 0;">Refeições</p>
                </div>
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                  <p style="font-size: 24px; font-weight: 500; margin: 0; color: ${brandColor};">${this.state.checkins.length}</p>
                  <p style="font-size: 11px; color: #999; margin: 8px 0 0 0;">Check-ins</p>
                </div>
              </div>

              <h2 style="font-size: 13px; font-weight: 500; margin-bottom: 1rem; color: #333;">Minhas pacientes</h2>
              <div style="display: grid; gap: 1rem;">
                ${this.state.patients.map(patient => {
                  const patientMeals = this.state.meals.filter(m => m.patientId === patient.id);
                  const patientWeights = this.state.weights.filter(w => w.patientId === patient.id);
                  const patientCheckins = this.state.checkins.filter(c => c.patientId === patient.id);
                  const adherence = patientMeals.length > 0 ? Math.round((patientMeals.filter(m => m.status === 'done' || m.status === 'adapted').length / patientMeals.length) * 100) : 0;

                  return `
                    <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}40;">
                      <div style="margin-bottom: 1rem;">
                        <h3 style="font-size: 14px; font-weight: 500; margin: 0; color: ${brandColor};">${patient.name}</h3>
                        <p style="font-size: 11px; color: #999; margin: 4px 0 0 0;">${patient.email}</p>
                      </div>

                      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 11px; margin-bottom: 1rem;">
                        <div>
                          <p style="color: #999; margin: 0 0 4px 0; font-weight: 500;">Adesão</p>
                          <p style="font-weight: 500; margin: 0; color: ${adherence >= 80 ? '#28a745' : adherence >= 60 ? '#ffc107' : '#dc3545'};">${adherence}%</p>
                        </div>
                        <div>
                          <p style="color: #999; margin: 0 0 4px 0; font-weight: 500;">Peso</p>
                          <p style="font-weight: 500; margin: 0; color: #333;">${patientWeights.length > 0 ? `${patientWeights[patientWeights.length - 1].weight}kg` : 'N/A'}</p>
                        </div>
                        <div>
                          <p style="color: #999; margin: 0 0 4px 0; font-weight: 500;">Check-ins</p>
                          <p style="font-weight: 500; margin: 0; color: #333;">${patientCheckins.length}</p>
                        </div>
                      </div>

                      <button onclick="app.viewPatientMeals('${patient.id}'); " style="width: 100%; padding: 8px; background: transparent; border: 0.5px solid ${brandColor}; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; color: ${brandColor};">
                        Ver refeições (${patientMeals.length})
                      </button>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        `;
      },

      viewPatientMeals(patientId) {
        const patient = this.state.patients.find(p => p.id === patientId);
        const patientMeals = this.state.meals.filter(m => m.patientId === patientId).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        const mealLabels = {
          breakfast: 'Café da manhã',
          snack1: 'Lanche da manhã',
          lunch: 'Almoço',
          snack2: 'Lanche da tarde',
          dinner: 'Jantar'
        };

        const statusLabels = {
          done: '✓ Fiz como planejado',
          adapted: '~ Adaptei bem',
          improvised: '! Improvisei',
          skipped: '× Pulei'
        };

        const statusColors = {
          done: '#28a745',
          adapted: '#0066cc',
          improvised: '#ffc107',
          skipped: '#dc3545'
        };

        const html = `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Refeições - ${patient.name}</h1>
              <button onclick="app.state.screen = 'panel'; app.render();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 20px;">✕</button>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              ${patientMeals.length > 0 ? `
                <div style="display: grid; gap: 8px;">
                  ${patientMeals.map((meal, i) => `
                    <div style="background: #ffffff; border-radius: 6px; padding: 12px; border: 0.5px solid #e0e0e0;">
                      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                        <div>
                          <p style="font-size: 13px; font-weight: 500; margin: 0; color: #333;">${mealLabels[meal.time] || meal.time}</p>
                          <p style="font-size: 11px; color: #999; margin: 2px 0 0 0;">${new Date(meal.date).toLocaleDateString('pt-BR')} às ${new Date(meal.timestamp).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                        <span style="padding: 4px 8px; background: ${statusColors[meal.status]}; color: #ffffff; border-radius: 4px; font-size: 11px; font-weight: 500;">${statusLabels[meal.status]}</span>
                      </div>
                      ${meal.notes ? `<p style="font-size: 12px; color: #666; margin: 0; font-style: italic; padding: 8px; background: #f9f9f9; border-radius: 4px; border-left: 3px solid ${statusColors[meal.status]};">"${meal.notes}"</p>` : ''}
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div style="background: #ffffff; border-radius: 8px; padding: 2rem; text-align: center; border: 0.5px solid #e0e0e0;">
                  <p style="color: #999; margin: 0;">Nenhuma refeição registrada ainda</p>
                </div>
              `}
            </div>
          </div>
        `;

        document.getElementById('app').innerHTML = html;
      },

      saveMeal() {
        const time = this.state.formData.time;
        const notes = this.state.formData.notes;
        if (!this.state.formData.status || !time) {
          this.addNotification('Selecione refeição e status', 'error');
          return;
        }
        this.addMeal({ ...this.state.formData, time, notes });
      },

      saveCheckin() {
        if (!this.state.formData.adherence) {
          this.addNotification('Preencha todas as escalas', 'error');
          return;
        }
        const difficulty = this.state.formData.difficulty || '';
        const needsHelp = this.state.formData.needsHelp || false;
        this.addCheckin({ ...this.state.formData, difficulty, needsHelp });
      },

      saveWeight() {
        const weight = this.state.formData.weight;
        const feeling = this.state.formData.feeling;
        if (!weight) {
          this.addNotification('Informe seu peso', 'error');
          return;
        }
        this.addWeight({ weight, feeling });
      },

      copyLink(link, name) {
        navigator.clipboard.writeText(link);
        this.addNotification(`Link de ${name} copiado!`, 'success');
      },

      render() {
        let html = '';

        if (!this.state.user) {
          html = this.renderLogin();
        } else if (this.state.user.type === 'patient') {
          if (this.state.screen === 'dashboard') {
            html = this.renderDashboard();
          } else if (this.state.screen === 'meal') {
            html = this.renderMeal();
          } else if (this.state.screen === 'checkin') {
            html = this.renderCheckin();
          } else if (this.state.screen === 'weight') {
            html = this.renderWeight();
          } else if (this.state.screen === 'weightHistory') {
            html = this.renderWeightHistory();
          } else if (this.state.screen === 'mealHistory') {
            html = this.renderMealHistory();
          }
        } else if (this.state.user.type === 'nutritionist') {
          html = this.renderPanel();
        }

        // Notificações
        html += `
          <div style="position: fixed; top: 1rem; right: 1rem; z-index: 999; max-width: 300px; pointer-events: none;">
            ${this.state.notifications.map(notif => `
              <div class="notification" style="background: ${notif.type === 'success' ? '#28a745' : notif.type === 'error' ? '#dc3545' : '#0066cc'}; color: #ffffff; padding: 12px 16px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); pointer-events: auto;">
                ${notif.message}
              </div>
            `).join('')}
          </div>
        `;

        document.getElementById('app').innerHTML = html;
      }
    };

    app.init();
  </script>
</body>
</html>
