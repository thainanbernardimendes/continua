<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTINUA - App de Adesão Nutricional</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    #app {
      min-height: 100vh;
    }
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .notification {
      animation: slideIn 0.3s ease-out;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .spinner {
      border: 4px solid #e0e0e0;
      border-top: 4px solid #157475;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const brandColor = '#157475';
    
    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBRqqgA7_jJyHNJUwcDpFyEmUHoUesnKDg",
      authDomain: "continua-app-bd0ab.firebaseapp.com",
      projectId: "continua-app-bd0ab",
      storageBucket: "continua-app-bd0ab.firebasestorage.app",
      messagingSenderId: "105620107590",
      appId: "1:105620107590:web:1b01790580bba84c4f7547",
      measurementId: "G-43E7NQN9WD"
    };

    // Inicializar Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const appState = {
      user: null,
      screen: 'dashboard',
      currentPatientId: '1',
      patients: [
        { id: '1', name: 'Tainá', email: 'taina@email.com', phone: '11987654321' },
        { id: '2', name: 'Lilian', email: 'lilian@email.com', phone: '11987654322' },
        { id: '3', name: 'Luisa', email: 'luisa@email.com', phone: '11987654323' },
        { id: '4', name: 'Marciana', email: 'marciana@email.com', phone: '11987654324' },
      ],
      meals: [],
      checkins: [],
      weights: [],
      formData: {
        mealTime: '',
        status: '',
        notes: ''
      },
      showMenu: false,
      notifications: [],
      selectedPatientPanel: '1',
      isLoading: true
    };

    const continuaApp = {
      state: appState,

      async init() {
        // Detectar parâmetro de paciente na URL
        const params = new URLSearchParams(window.location.search);
        const patientId = params.get('patient');
        
        if (patientId && this.state.patients.find(p => p.id === patientId)) {
          this.state.currentPatientId = patientId;
          const patientName = this.state.patients.find(p => p.id === patientId)?.name;
          this.state.user = { type: 'patient', name: patientName, id: patientId };
          this.state.screen = 'dashboard';
        }

        // Carregar dados do Firebase
        await this.loadDataFromFirebase();
        this.setupRealtimeListeners();
        
        this.state.isLoading = false;
        this.render();
      },

      async loadDataFromFirebase() {
        try {
          const mealsSnapshot = await db.ref('meals').once('value');
          const checkinsSnapshot = await db.ref('checkins').once('value');
          const weightsSnapshot = await db.ref('weights').once('value');

          this.state.meals = mealsSnapshot.val() ? Object.values(mealsSnapshot.val()) : [];
          this.state.checkins = checkinsSnapshot.val() ? Object.values(checkinsSnapshot.val()) : [];
          this.state.weights = weightsSnapshot.val() ? Object.values(weightsSnapshot.val()) : [];
        } catch (error) {
          console.error('Erro ao carregar dados:', error);
          this.addNotification('Erro ao conectar ao Firebase', 'error');
        }
      },

      setupRealtimeListeners() {
        // Listener para refeições
        db.ref('meals').on('value', (snapshot) => {
          this.state.meals = snapshot.val() ? Object.values(snapshot.val()) : [];
          if (!this.state.isLoading) {
            this.render();
          }
        });

        // Listener para check-ins
        db.ref('checkins').on('value', (snapshot) => {
          this.state.checkins = snapshot.val() ? Object.values(snapshot.val()) : [];
          if (!this.state.isLoading) {
            this.render();
          }
        });

        // Listener para pesos
        db.ref('weights').on('value', (snapshot) => {
          this.state.weights = snapshot.val() ? Object.values(snapshot.val()) : [];
          if (!this.state.isLoading) {
            this.render();
          }
        });
      },

      async addMeal(mealData) {
        const newMeal = {
          id: Date.now().toString(),
          patientId: this.state.currentPatientId,
          date: new Date().toISOString().split('T')[0],
          time: mealData.time,
          status: mealData.status,
          notes: mealData.notes || '',
          timestamp: new Date().toISOString()
        };

        try {
          await db.ref(`meals/${newMeal.id}`).set(newMeal);
          this.addNotification('Refeição registrada com sucesso!', 'success');
          this.state.screen = 'dashboard';
          this.state.formData = { mealTime: '', status: '', notes: '' };
          this.render();
        } catch (error) {
          console.error('Erro ao salvar refeição:', error);
          this.addNotification('Erro ao registrar refeição', 'error');
        }
      },

      async addCheckin(checkinData) {
        const newCheckin = {
          id: Date.now().toString(),
          patientId: this.state.currentPatientId,
          date: new Date().toISOString(),
          adherence: checkinData.adherence,
          hunger: checkinData.hunger,
          sweet: checkinData.sweet,
          energy: checkinData.energy,
          anxiety: checkinData.anxiety,
          bowel: checkinData.bowel,
          control: checkinData.control,
          difficulty: checkinData.difficulty,
          needsHelp: checkinData.needsHelp
        };

        try {
          await db.ref(`checkins/${newCheckin.id}`).set(newCheckin);
          this.addNotification('Check-in salvo! Thainan vai analisar sua semana.', 'success');
          this.state.screen = 'dashboard';
          this.state.formData = {};
          this.render();
        } catch (error) {
          console.error('Erro ao salvar check-in:', error);
          this.addNotification('Erro ao registrar check-in', 'error');
        }
      },

      async addWeight(weightData) {
        const newWeight = {
          id: Date.now().toString(),
          patientId: this.state.currentPatientId,
          date: new Date().toISOString().split('T')[0],
          weight: parseFloat(weightData.weight),
          feeling: weightData.feeling
        };

        try {
          await db.ref(`weights/${newWeight.id}`).set(newWeight);
          this.addNotification('Peso registrado!', 'success');
          this.state.screen = 'dashboard';
          this.state.formData = {};
          this.render();
        } catch (error) {
          console.error('Erro ao salvar peso:', error);
          this.addNotification('Erro ao registrar peso', 'error');
        }
      },

      addNotification(message, type = 'info') {
        const id = Date.now();
        this.state.notifications.push({ id, message, type });
        this.render();
        setTimeout(() => {
          this.state.notifications = this.state.notifications.filter(n => n.id !== id);
          this.render();
        }, 4000);
      },

      handleLogin(type) {
        if (type === 'nutritionist') {
          this.state.user = { type: 'nutritionist', name: 'Thainan' };
          this.state.screen = 'panel';
        } else {
          this.state.user = { type: 'patient', name: this.state.patients[0]?.name, id: '1' };
          this.state.currentPatientId = '1';
          this.state.screen = 'dashboard';
        }
        this.render();
      },

      logout() {
        this.state.user = null;
        this.state.showMenu = false;
        this.state.screen = 'dashboard';
        this.state.formData = {};
        this.render();
      },

      renderLogin() {
        const baseURL = window.location.href.split('?')[0];
        
        return `
          <div style="min-height: 100vh; background: #f5f5f5; display: flex; align-items: center; justify-content: center; padding: 1rem;">
            <div style="max-width: 500px; width: 100%;">
              <div style="background: #ffffff; border-radius: 12px; padding: 2rem; border: 0.5px solid ${brandColor}20;">
                <h1 style="font-size: 28px; font-weight: 500; margin-bottom: 0.5rem; color: ${brandColor};">CONTINUA</h1>
                <p style="font-size: 13px; color: #666; margin-bottom: 2rem;">App de adesão nutricional</p>

                <div style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 0.5px solid ${brandColor}20;">
                  <h2 style="font-size: 13px; font-weight: 500; color: #333; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px;">Links das pacientes</h2>
                  
                  ${this.state.patients.map(patient => `
                    <div style="margin-bottom: 1rem; padding: 0.75rem; background: #f9f9f9; border-radius: 6px; border: 0.5px solid #e0e0e0;">
                      <p style="font-size: 12px; font-weight: 500; color: #333; margin: 0 0 6px 0;">${patient.name}</p>
                      <div style="display: flex; gap: 6px; align-items: center;">
                        <input type="text" value="${baseURL}?patient=${patient.id}" readonly style="flex: 1; padding: 6px 8px; font-size: 11px; border-radius: 4px; border: 0.5px solid #e0e0e0; background: #ffffff; font-family: monospace;" />
                        <button onclick="continuaApp.copyLink('${baseURL}?patient=${patient.id}', '${patient.name}')" style="padding: 6px 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 500; color: #ffffff; white-space: nowrap;">Copiar</button>
                      </div>
                    </div>
                  `).join('')}
                </div>

                <p style="font-size: 12px; color: #666; margin-bottom: 1.5rem; font-style: italic;">Ou entre como:</p>

                <button onclick="continuaApp.handleLogin('patient')" style="width: 100%; padding: 12px; margin-bottom: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff;">
                  Entrar como Paciente
                </button>

                <button onclick="continuaApp.handleLogin('nutritionist')" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Acessar Painel (Nutricionista)
                </button>

                <div style="margin-top: 2rem; padding-top: 1rem; border-top: 0.5px solid ${brandColor}20;">
                  <p style="font-size: 11px; color: #999; margin: 0;">🔄 Dados sincronizados em tempo real com Firebase</p>
                </div>
              </div>
            </div>
          </div>
        `;
      },

      renderDashboard() {
        const currentPatient = this.state.patients.find(p => p.id === this.state.currentPatientId);
        const weekMeals = this.state.meals.filter(m => {
          const mealDate = new Date(m.date);
          const weekStart = new Date();
          weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
          return m.patientId === this.state.currentPatientId && mealDate >= weekStart;
        });
        const adherence = weekMeals.length > 0 ? Math.round((weekMeals.filter(m => m.status === 'done' || m.status === 'adapted').length / Math.max(weekMeals.length, 1)) * 100) : 0;
        const lastWeight = this.state.weights.filter(w => w.patientId === this.state.currentPatientId).sort((a, b) => new Date(b.date) - new Date(a.date))[0];

        let weekDaysHtml = '';
        for (let i = 0; i < 7; i++) {
          const date = new Date();
          date.setDate(date.getDate() - date.getDay() + 1 + i);
          const dayMeals = this.state.meals.filter(m => m.patientId === this.state.currentPatientId && m.date === date.toISOString().split('T')[0]);
          const dayStatus = dayMeals.length === 0 ? 'empty' : dayMeals.some(m => m.status === 'done') ? 'good' : 'ok';
          const colors = { empty: '#e8e8e8', good: '#d4f0ed', ok: '#fff3cd' };
          const days = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'];
          weekDaysHtml += `
            <div style="background: ${colors[dayStatus]}; border-radius: 6px; padding: 8px; text-align: center;">
              <p style="font-size: 11px; font-weight: 500; margin: 0 0 4px 0; color: #666;">${days[i]}</p>
              <p style="font-size: 13px; font-weight: 500; margin: 0; color: ${brandColor};">${dayMeals.length}</p>
            </div>
          `;
        }

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <h1 style="font-size: 18px; font-weight: 500; margin: 0;">Oi, ${currentPatient?.name.split(' ')[0]}!</h1>
                <p style="font-size: 12px; margin: 4px 0 0 0; opacity: 0.9;">🔄 Dados em tempo real</p>
              </div>
              <button onclick="continuaApp.state.showMenu = !continuaApp.state.showMenu; continuaApp.render();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 20px;">≡</button>
            </div>

            ${this.state.showMenu ? `
              <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex;">
                <div style="background: #ffffff; padding: 1rem; width: 160px; margin-left: auto;">
                  <button onclick="continuaApp.state.showMenu = false; continuaApp.render();" style="background: none; border: none; cursor: pointer; font-size: 18px; margin-bottom: 1rem; width: 100%; text-align: right;">✕</button>
                  <button onclick="continuaApp.logout();" style="width: 100%; padding: 10px; background: transparent; border: 0.5px solid ${brandColor}; border-radius: 4px; cursor: pointer; font-size: 13px; color: ${brandColor}; font-weight: 500;">Sair</button>
                </div>
              </div>
            ` : ''}

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              <h2 style="font-size: 12px; color: #999; font-weight: 500; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;">Sua semana</h2>
              <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 1.5rem;">
                ${weekDaysHtml}
              </div>

              <button onclick="continuaApp.state.screen = 'meal'; continuaApp.state.formData = { mealTime: '', status: '', notes: '' }; continuaApp.render();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; font-size: 14px; font-weight: 500; color: #ffffff; cursor: pointer; margin-bottom: 1rem;">
                Registrar refeição hoje
              </button>

              <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; margin-bottom: 1rem;">
                <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Adesão da semana</p>
                <p style="font-size: 18px; font-weight: 500; margin: 0 0 4px 0; color: ${brandColor};">${weekMeals.filter(m => m.status === 'done' || m.status === 'adapted').length} de ${Math.max(weekMeals.length, 35)} refeições</p>
                <p style="font-size: 12px; color: ${adherence >= 80 ? '#28a745' : '#666'}; margin: 0;">${adherence}%</p>
              </div>

              <div onclick="continuaApp.state.screen = 'checkin'; continuaApp.state.formData = {}; continuaApp.render();" style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}20; margin-bottom: 1rem; cursor: pointer;">
                <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Próximo passo</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <p style="font-size: 14px; font-weight: 500; margin: 0; color: ${brandColor};">Check-in semanal</p>
                    <p style="font-size: 12px; color: #999; margin: 4px 0 0 0;">Domingo à noite</p>
                  </div>
                  <span style="font-size: 18px;">›</span>
                </div>
              </div>

              <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; margin-bottom: 1rem;">
                <p style="font-size: 12px; color: #999; margin: 0 0 8px 0; font-weight: 500;">Último peso</p>
                <p style="font-size: 16px; font-weight: 500; margin: 0; color: #333;">
                  ${lastWeight ? `${lastWeight.weight}kg` : 'Nenhum registro'}
                </p>
              </div>

              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                <button onclick="continuaApp.state.screen = 'weight'; continuaApp.state.formData = {}; continuaApp.render();" style="padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; font-size: 13px; font-weight: 500; color: #ffffff; cursor: pointer;">
                  Registrar peso
                </button>
                <button onclick="continuaApp.state.screen = 'mealHistory'; continuaApp.render();" style="padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; font-size: 13px; font-weight: 500; color: ${brandColor}; cursor: pointer;">
                  Ver refeições
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderMeal() {
        const mealTimeLabel = {
          breakfast: 'Café da manhã',
          snack1: 'Lanche da manhã',
          lunch: 'Almoço',
          snack2: 'Lanche da tarde',
          dinner: 'Jantar'
        };

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Registrar refeição</h1>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto;">
              <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0;">
                
                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Qual refeição?</p>
                  <select id="mealTime" onchange="continuaApp.state.formData.mealTime = this.value; continuaApp.render();" value="${this.state.formData.mealTime || ''}" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; font-family: inherit;">
                    <option value="">Selecione</option>
                    <option value="breakfast" ${this.state.formData.mealTime === 'breakfast' ? 'selected' : ''}>Café da manhã</option>
                    <option value="snack1" ${this.state.formData.mealTime === 'snack1' ? 'selected' : ''}>Lanche da manhã</option>
                    <option value="lunch" ${this.state.formData.mealTime === 'lunch' ? 'selected' : ''}>Almoço</option>
                    <option value="snack2" ${this.state.formData.mealTime === 'snack2' ? 'selected' : ''}>Lanche da tarde</option>
                    <option value="dinner" ${this.state.formData.mealTime === 'dinner' ? 'selected' : ''}>Jantar</option>
                  </select>
                </label>

                ${this.state.formData.mealTime ? `
                  <div style="background: #d4f0ed; padding: 10px; border-radius: 6px; margin-bottom: 1.5rem; font-size: 12px; color: ${brandColor}; font-weight: 500;">
                    ✓ Refeição selecionada: <strong>${mealTimeLabel[this.state.formData.mealTime]}</strong>
                  </div>
                ` : ''}

                <div style="margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 1rem; color: #333;">Como foi essa refeição?</p>
                  ${['done', 'adapted', 'improvised', 'skipped'].map(status => `
                    <button onclick="continuaApp.state.formData.status = '${status}'; continuaApp.render();" style="width: 100%; padding: 12px; margin-bottom: 8px; background: ${this.state.formData.status === status ? brandColor : '#ffffff'}; border: 0.5px solid ${this.state.formData.status === status ? brandColor : '#e0e0e0'}; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: ${this.state.formData.status === status ? '#ffffff' : '#333'}; transition: all 0.2s;">
                      ${status === 'done' ? '✓ Fiz como planejado' : status === 'adapted' ? '~ Adaptei bem' : status === 'improvised' ? '! Improvisei' : '× Pulei'}
                    </button>
                  `).join('')}
                </div>

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Observação (opcional)</p>
                  <textarea id="mealNotes" placeholder="Ex: comi um doce, pulei porque estava ocupada" value="${this.state.formData.notes || ''}" onchange="continuaApp.state.formData.notes = this.value; continuaApp.render();" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; font-family: inherit; min-height: 60px; resize: vertical;">${this.state.formData.notes || ''}</textarea>
                </label>

                <button onclick="continuaApp.saveMealFixed();" style="width: 100%; padding: 12px; background: ${this.state.formData.mealTime && this.state.formData.status ? brandColor : '#ccc'}; border: 0.5px solid ${this.state.formData.mealTime && this.state.formData.status ? brandColor : '#ccc'}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff; margin-bottom: 8px; transition: all 0.2s;" ${!this.state.formData.mealTime || !this.state.formData.status ? 'disabled' : ''}>
                  ${!this.state.formData.mealTime || !this.state.formData.status ? '⏸️ Selecione refeição e status' : '✓ Pronto!'}
                </button>

                <button onclick="continuaApp.state.screen = 'dashboard'; continuaApp.state.formData = {}; continuaApp.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      },

      saveMealFixed() {
        if (!this.state.formData.mealTime) {
          this.addNotification('Selecione a refeição', 'error');
          return;
        }
        if (!this.state.formData.status) {
          this.addNotification('Selecione o status da refeição', 'error');
          return;
        }

        const mealData = {
          time: this.state.formData.mealTime,
          status: this.state.formData.status,
          notes: this.state.formData.notes || ''
        };

        this.addMeal(mealData);
      },

      renderMealHistory() {
        const patientMeals = this.state.meals.filter(m => m.patientId === this.state.currentPatientId).sort((a, b) => new Date(b.date) - new Date(a.date));
        
        const mealLabels = {
          breakfast: '☕ Café da manhã',
          snack1: '🥤 Lanche da manhã',
          lunch: '🍽️ Almoço',
          snack2: '🥗 Lanche da tarde',
          dinner: '🌙 Jantar'
        };

        const statusColors = {
          done: '#28a745',
          adapted: '#ffc107',
          improvised: '#fd7e14',
          skipped: '#dc3545'
        };

        const statusLabels = {
          done: '✓ Como planejado',
          adapted: '~ Adaptado',
          improvised: '! Improviso',
          skipped: '× Pulado'
        };

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Histórico de refeições</h1>
              <button onclick="continuaApp.state.screen = 'dashboard'; continuaApp.render();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 20px;">✕</button>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              ${patientMeals.length > 0 ? `
                <h3 style="font-size: 12px; color: #666; font-weight: 500; margin-bottom: 1rem;">Total: ${patientMeals.length} refeições registradas</h3>
                <div style="display: grid; gap: 10px;">
                  ${patientMeals.map(meal => `
                    <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; border-left: 4px solid ${statusColors[meal.status]};">
                      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                        <div>
                          <p style="font-size: 14px; font-weight: 500; margin: 0; color: #333;">${mealLabels[meal.time] || meal.time}</p>
                          <p style="font-size: 11px; color: #999; margin: 4px 0 0 0;">${new Date(meal.date).toLocaleDateString('pt-BR')}</p>
                        </div>
                        <span style="background: ${statusColors[meal.status]}; color: #ffffff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;">${statusLabels[meal.status]}</span>
                      </div>
                      ${meal.notes ? `<p style="font-size: 12px; color: #666; margin: 8px 0 0 0; font-style: italic;">📝 ${meal.notes}</p>` : ''}
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div style="background: #ffffff; border-radius: 8px; padding: 2rem; text-align: center; border: 0.5px solid #e0e0e0;">
                  <p style="color: #999; margin: 0;">Nenhuma refeição registrada ainda</p>
                  <button onclick="continuaApp.state.screen = 'meal'; continuaApp.state.formData = { mealTime: '', status: '', notes: '' }; continuaApp.render();" style="margin-top: 1rem; padding: 10px 20px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: #ffffff;">
                    Registrar primeira refeição
                  </button>
                </div>
              `}
            </div>
          </div>
        `;
      },

      renderCheckin() {
        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Check-in semanal</h1>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem;">
              <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0;">

                ${['adherence', 'hunger', 'sweet', 'energy', 'anxiety', 'control'].map(key => {
                  const labels = {
                    adherence: 'Como foi sua adesão?',
                    hunger: 'Seu nível de fome?',
                    sweet: 'Vontade de doce?',
                    energy: 'Sua energia?',
                    anxiety: 'Ansiedade interferiu?',
                    control: 'Sensação de controle?'
                  };
                  return `
                    <div style="margin-bottom: 1.5rem;">
                      <label style="display: block; margin-bottom: 0.75rem;">
                        <p style="font-size: 12px; font-weight: 500; color: #333; margin: 0;">${labels[key]}</p>
                      </label>
                      <div style="display: flex; gap: 6px; justify-content: space-between;">
                        ${[1,2,3,4,5].map(val => `
                          <button onclick="continuaApp.state.formData.${key} = ${val}; continuaApp.render();" style="width: 100%; padding: 8px; background: ${this.state.formData[key] === val ? brandColor : '#f5f5f5'}; border: 0.5px solid ${this.state.formData[key] === val ? brandColor : '#e0e0e0'}; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: ${this.state.formData[key] === val ? 500 : 400}; color: ${this.state.formData[key] === val ? '#ffffff' : '#666'};">
                            ${val}
                          </button>
                        `).join('')}
                      </div>
                    </div>
                  `;
                }).join('')}

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 12px; font-weight: 500; margin-bottom: 6px; color: #333;">Qual foi a principal dificuldade? (opcional)</p>
                  <textarea id="checkinDifficulty" placeholder="Ex: muito doce, não consegui parar" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; min-height: 50px;"></textarea>
                </label>

                <label style="display: block; margin-bottom: 1.5rem;">
                  <input type="checkbox" id="checkinHelp" style="margin-right: 8px; accent-color: ${brandColor};" />
                  <span style="font-size: 13px; color: #333;">Estou travada e preciso de ajuda</span>
                </label>

                <button onclick="continuaApp.saveCheckin();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff; margin-bottom: 8px;">
                  Enviar check-in
                </button>

                <button onclick="continuaApp.state.screen = 'dashboard'; continuaApp.state.formData = {}; continuaApp.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderWeight() {
        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Registrar peso</h1>
            </div>

            <div style="padding: 1rem; max-width: 600px; margin: 0 auto;">
              <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0;">

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Quanto você pesa?</p>
                  <input type="number" id="weightInput" step="0.1" placeholder="Ex: 75.2" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; font-family: inherit;" />
                </label>

                <label style="display: block; margin-bottom: 1.5rem;">
                  <p style="font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333;">Como você se sente com seu peso?</p>
                  <select id="weightFeeling" style="width: 100%; padding: 8px; border-radius: 4px; border: 0.5px solid ${brandColor}40; font-size: 13px; font-family: inherit;">
                    <option value="">Selecione</option>
                    <option value="terrible">Péssimo</option>
                    <option value="bad">Ruim</option>
                    <option value="ok">Ok</option>
                    <option value="good">Bem</option>
                    <option value="excellent">Ótimo</option>
                  </select>
                </label>

                <button onclick="continuaApp.saveWeight();" style="width: 100%; padding: 12px; background: ${brandColor}; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #ffffff; margin-bottom: 8px;">
                  Registrar
                </button>

                <button onclick="continuaApp.state.screen = 'dashboard'; continuaApp.state.formData = {}; continuaApp.render();" style="width: 100%; padding: 12px; background: #ffffff; border: 0.5px solid ${brandColor}; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: ${brandColor};">
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      },

      renderPanel() {
        const selectedPatient = this.state.patients.find(p => p.id === this.state.selectedPatientPanel);
        const patientMeals = this.state.meals.filter(m => m.patientId === this.state.selectedPatientPanel).sort((a, b) => new Date(b.date) - new Date(a.date));
        const patientCheckins = this.state.checkins.filter(c => c.patientId === this.state.selectedPatientPanel).sort((a, b) => new Date(b.date) - new Date(a.date));
        const patientWeights = this.state.weights.filter(w => w.patientId === this.state.selectedPatientPanel).sort((a, b) => new Date(b.date) - new Date(a.date));

        const mealLabels = {
          breakfast: '☕ Café da manhã',
          snack1: '🥤 Lanche da manhã',
          lunch: '🍽️ Almoço',
          snack2: '🥗 Lanche da tarde',
          dinner: '🌙 Jantar'
        };

        const statusColors = {
          done: '#28a745',
          adapted: '#ffc107',
          improvised: '#fd7e14',
          skipped: '#dc3545'
        };

        const statusLabels = {
          done: '✓ Como planejado',
          adapted: '~ Adaptado',
          improvised: '! Improviso',
          skipped: '× Pulado'
        };

        return `
          <div style="min-height: 100vh; background: #f5f5f5;">
            <div style="background: ${brandColor}; color: #ffffff; padding: 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center;">
              <h1 style="font-size: 16px; font-weight: 500; margin: 0;">Painel da Nutricionista</h1>
              <button onclick="continuaApp.logout();" style="background: none; border: none; cursor: pointer; color: inherit; font-size: 18px;">↗</button>
            </div>

            <div style="padding: 1rem; max-width: 1000px; margin: 0 auto; padding-bottom: 2rem;">
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}40; text-align: center;">
                  <p style="font-size: 24px; font-weight: 500; margin: 0; color: ${brandColor};">${this.state.patients.length}</p>
                  <p style="font-size: 11px; color: #999; margin: 8px 0 0 0;">Pacientes</p>
                </div>
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                  <p style="font-size: 24px; font-weight: 500; margin: 0; color: ${brandColor};">${this.state.meals.length}</p>
                  <p style="font-size: 11px; color: #999; margin: 8px 0 0 0;">Refeições</p>
                </div>
                <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                  <p style="font-size: 24px; font-weight: 500; margin: 0; color: ${brandColor};">${this.state.checkins.length}</p>
                  <p style="font-size: 11px; color: #999; margin: 8px 0 0 0;">Check-ins</p>
                </div>
              </div>

              <h2 style="font-size: 13px; font-weight: 500; margin-bottom: 1rem; color: #333;">Minhas pacientes</h2>
              
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                ${this.state.patients.map(patient => {
                  const pMeals = this.state.meals.filter(m => m.patientId === patient.id);
                  const pWeights = this.state.weights.filter(w => w.patientId === patient.id);
                  const pCheckins = this.state.checkins.filter(c => c.patientId === patient.id);
                  const adherence = pMeals.length > 0 ? Math.round((pMeals.filter(m => m.status === 'done' || m.status === 'adapted').length / pMeals.length) * 100) : 0;

                  return `
                    <div style="background: #ffffff; border-radius: 8px; padding: 1rem; border: 0.5px solid ${brandColor}40; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.boxShadow='0 2px 8px rgba(21,116,117,0.1)'" onmouseout="this.style.boxShadow='none'" onclick="continuaApp.state.selectedPatientPanel = '${patient.id}'; continuaApp.render();">
                      <div style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid #e0e0e0;">
                        <h3 style="font-size: 14px; font-weight: 500; margin: 0; color: ${brandColor};">${patient.name}</h3>
                        <p style="font-size: 11px; color: #999; margin: 4px 0 0 0;">${patient.email}</p>
                      </div>

                      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 11px;">
                        <div>
                          <p style="color: #999; margin: 0 0 4px 0; font-weight: 500;">Adesão</p>
                          <p style="font-weight: 500; margin: 0; color: ${adherence >= 80 ? '#28a745' : adherence >= 60 ? '#ffc107' : '#dc3545'};">${adherence}%</p>
                        </div>
                        <div>
                          <p style="color: #999; margin: 0 0 4px 0; font-weight: 500;">Peso</p>
                          <p style="font-weight: 500; margin: 0; color: #333;">${pWeights.length > 0 ? `${pWeights[0].weight}kg` : 'N/A'}</p>
                        </div>
                        <div>
                          <p style="color: #999; margin: 0 0 4px 0; font-weight: 500;">Refeições</p>
                          <p style="font-weight: 500; margin: 0; color: #333;">${pMeals.length}</p>
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>

              ${selectedPatient ? `
                <div style="background: #ffffff; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0; margin-top: 2rem;">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid #e0e0e0;">
                    <h3 style="font-size: 14px; font-weight: 500; margin: 0; color: ${brandColor};">Detalhes de ${selectedPatient.name}</h3>
                    <button onclick="continuaApp.state.selectedPatientPanel = null; continuaApp.render();" style="background: none; border: none; cursor: pointer; font-size: 18px; color: #666;">✕</button>
                  </div>

                  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                    <div style="background: #f9f9f9; border-radius: 6px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                      <p style="font-size: 20px; font-weight: 500; margin: 0; color: ${brandColor};">${patientMeals.length}</p>
                      <p style="font-size: 11px; color: #999; margin: 6px 0 0 0;">Refeições</p>
                    </div>
                    <div style="background: #f9f9f9; border-radius: 6px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                      <p style="font-size: 20px; font-weight: 500; margin: 0; color: ${brandColor};">${patientCheckins.length}</p>
                      <p style="font-size: 11px; color: #999; margin: 6px 0 0 0;">Check-ins</p>
                    </div>
                    <div style="background: #f9f9f9; border-radius: 6px; padding: 1rem; border: 0.5px solid #e0e0e0; text-align: center;">
                      <p style="font-size: 20px; font-weight: 500; margin: 0; color: ${brandColor};">${patientWeights.length}</p>
                      <p style="font-size: 11px; color: #999; margin: 6px 0 0 0;">Pesagens</p>
                    </div>
                  </div>

                  <h4 style="font-size: 12px; font-weight: 500; color: #666; margin-bottom: 1rem; text-transform: uppercase;">Últimas refeições</h4>
                  ${patientMeals.length > 0 ? `
                    <div style="display: grid; gap: 10px; margin-bottom: 2rem;">
                      ${patientMeals.slice(0, 5).map(meal => `
                        <div style="background: #f9f9f9; border-radius: 6px; padding: 12px; border-left: 4px solid ${statusColors[meal.status]}; display: flex; justify-content: space-between; align-items: center;">
                          <div>
                            <p style="font-size: 13px; font-weight: 500; margin: 0; color: #333;">${mealLabels[meal.time] || meal.time}</p>
                            <p style="font-size: 11px; color: #999; margin: 4px 0 0 0;">${new Date(meal.date).toLocaleDateString('pt-BR')}</p>
                            ${meal.notes ? `<p style="font-size: 11px; color: #666; margin: 4px 0 0 0; font-style: italic;">📝 ${meal.notes}</p>` : ''}
                          </div>
                          <span style="background: ${statusColors[meal.status]}; color: #ffffff; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; white-space: nowrap;">${statusLabels[meal.status]}</span>
                        </div>
                      `).join('')}
                    </div>
                  ` : `<p style="color: #999; font-size: 12px; margin-bottom: 2rem;">Sem refeições registradas</p>`}

                  <h4 style="font-size: 12px; font-weight: 500; color: #666; margin-bottom: 1rem; text-transform: uppercase;">Últimos check-ins</h4>
                  ${patientCheckins.length > 0 ? `
                    <div style="display: grid; gap: 10px;">
                      ${patientCheckins.slice(0, 3).map(checkin => `
                        <div style="background: #f9f9f9; border-radius: 6px; padding: 12px; border: 0.5px solid #e0e0e0;">
                          <p style="font-size: 12px; color: #999; margin: 0 0 8px 0;">${new Date(checkin.date).toLocaleDateString('pt-BR')}</p>
                          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 11px;">
                            <div><span style="font-weight: 500;">Adesão:</span> ${checkin.adherence}/5</div>
                            <div><span style="font-weight: 500;">Ansiedade:</span> ${checkin.anxiety}/5</div>
                            <div><span style="font-weight: 500;">Controle:</span> ${checkin.control}/5</div>
                          </div>
                          ${checkin.difficulty ? `<p style="font-size: 11px; color: #666; margin: 8px 0 0 0; font-style: italic;">📝 Dificuldade: ${checkin.difficulty}</p>` : ''}
                          ${checkin.needsHelp ? `<p style="font-size: 11px; color: #dc3545; margin: 8px 0 0 0; font-weight: 500;">⚠️ Paciente solicita ajuda</p>` : ''}
                        </div>
                      `).join('')}
                    </div>
                  ` : `<p style="color: #999; font-size: 12px;">Sem check-ins registrados</p>`}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      },

      saveCheckin() {
        if (!this.state.formData.adherence || !this.state.formData.hunger || !this.state.formData.sweet || !this.state.formData.energy || !this.state.formData.anxiety || !this.state.formData.control) {
          this.addNotification('Responda todas as perguntas obrigatórias', 'error');
          return;
        }

        const difficulty = document.getElementById('checkinDifficulty').value;
        const needsHelp = document.getElementById('checkinHelp').checked;
        this.addCheckin({ ...this.state.formData, difficulty, needsHelp });
      },

      saveWeight() {
        const weight = document.getElementById('weightInput').value;
        const feeling = document.getElementById('weightFeeling').value;
        if (!weight) {
          this.addNotification('Informe seu peso', 'error');
          return;
        }
        this.addWeight({ weight, feeling });
      },

      copyLink(link, name) {
        navigator.clipboard.writeText(link);
        this.addNotification(`Link de ${name} copiado!`, 'success');
      },

      render() {
        let html = '';

        if (this.state.isLoading) {
          html = `<div class="loading"><div class="spinner"></div></div>`;
        } else if (!this.state.user) {
          html = this.renderLogin();
        } else if (this.state.user.type === 'patient') {
          if (this.state.screen === 'dashboard') {
            html = this.renderDashboard();
          } else if (this.state.screen === 'meal') {
            html = this.renderMeal();
          } else if (this.state.screen === 'mealHistory') {
            html = this.renderMealHistory();
          } else if (this.state.screen === 'checkin') {
            html = this.renderCheckin();
          } else if (this.state.screen === 'weight') {
            html = this.renderWeight();
          }
        } else if (this.state.user.type === 'nutritionist') {
          html = this.renderPanel();
        }

        // Adicionar notificações
        html += `
          <div style="position: fixed; top: 1rem; right: 1rem; z-index: 999; max-width: 300px;">
            ${this.state.notifications.map(notif => `
              <div class="notification" style="background: ${notif.type === 'success' ? '#28a745' : notif.type === 'error' ? '#dc3545' : notif.type === 'reminder' ? brandColor : '#0066cc'}; color: #ffffff; padding: 12px 16px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                ${notif.message}
              </div>
            `).join('')}
          </div>
        `;

        document.getElementById('app').innerHTML = html;
      }
    };

    // Inicializar app
    continuaApp.init();
  </script>
</body>
</html>
